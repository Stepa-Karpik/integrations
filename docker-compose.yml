services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: integrations
      POSTGRES_USER: integrations
      POSTGRES_PASSWORD: integrations
    ports:
      - "127.0.0.1:5531:5432"
  migrator:
    build: .
    env_file: [.env]
    command: ["alembic", "upgrade", "head"]
    depends_on: [postgres]
  api:
    build: .
    env_file: [.env]
    depends_on: [migrator]
    ports:
      - "127.0.0.1:8310:8310"
    networks:
      default:
      ecosystem:
        aliases: [integrations]

networks:
  ecosystem:
    external: true
